<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switchyard Run Club</title>

  <style>
    :root {
      --primary: #ff4500;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }
    
    header { text-align: center; padding: 3rem 1rem; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
    header h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 0.5rem; }
    header p { color: var(--muted); font-size: 1.1rem; }

    main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    
    .schedule-card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .schedule-card h2 {
      margin-bottom: 1rem;
    }

    /* Responsive Google Calendar Container */
    .calendar-container {
      position: relative;
      padding-bottom: 75%; /* Aspect ratio */
      height: 0;
      overflow: hidden;
      border-radius: 8px;
    }

    .calendar-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 600px) {
      .calendar-container {
        padding-bottom: 125%; /* Taller aspect ratio for mobile screens */
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>🏃 Switchyard Run Club</h1>
    <p>All paces welcome. Join us for weekly community runs!</p>
  </header>

  <main>
    <section class="schedule-card">
      <h2>Upcoming Runs & Events</h2>
      
      <div class="calendar-container">
        <!-- Replace YOUR_CALENDAR_ID@gmail.com with your actual public Google Calendar ID -->
        <iframe 
          src="https://calendar.google.com/calendar/embed?showTitle=0&amp;showNav=1&amp;showDate=1&amp;showPrint=0&amp;showTabs=0&amp;showCalendars=0&amp;showTz=1&amp;mode=AGENDA&amp;src=YOUR_CALENDAR_ID@gmail.com&amp;color=%23ff4500" 
          style="border: 0" 
          width="800" 
          height="600" 
          frameborder="0" 
          scrolling="no">
        </iframe>
      </div>
    </section>
  </main>

</body>
</html>
